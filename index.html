<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>✨ InventarisPintar | Manajemen Item Lengkap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .inventory-card {
            transition: all 0.3s ease;
            border-radius: 1rem;
            background: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .inventory-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.2);
        }
        .toast-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            animation: slideInRight 0.3s ease;
            max-width: 350px;
        }
        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        .modal-overlay {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }
        .quantity-input {
            width: 70px;
            text-align: center;
            font-weight: 600;
            border-radius: 40px;
            background: #f3f4f6;
            border: 1px solid #e5e7eb;
            padding: 6px 0;
        }
        .edit-input {
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            padding: 0.5rem;
            width: 100%;
            transition: all 0.2s;
        }
        .edit-input:focus {
            outline: none;
            border-color: #667eea;
            ring: 2px solid #667eea;
        }
    </style>
</head>
<body class="font-sans">
    <!-- Toast Container -->
    <div id="toastContainer" class="toast-notification"></div>

    <div class="max-w-7xl mx-auto px-4 py-6 md:py-8">
        <!-- Header -->
        <div class="glass-card p-6 mb-8">
            <div class="flex flex-wrap justify-between items-center gap-4">
                <div>
                    <h1 class="text-3xl md:text-4xl font-extrabold bg-gradient-to-r from-purple-600 to-indigo-600 bg-clip-text text-transparent">
                        <i class="fas fa-boxes text-indigo-500"></i> InventarisPintar
                    </h1>
                    <p class="text-gray-600 text-sm mt-1">Kelola stok, edit data, dan hapus item dengan mudah</p>
                </div>
                <div class="flex items-center gap-2 bg-indigo-50 rounded-full px-4 py-2">
                    <i class="fas fa-database text-indigo-500"></i>
                    <span class="text-sm font-medium text-indigo-700">Supabase Active</span>
                </div>
            </div>
        </div>

        <!-- Form Tambah Item -->
        <div class="glass-card p-6 mb-8">
            <div class="flex items-center gap-2 border-b border-gray-200 pb-3 mb-5">
                <i class="fas fa-plus-circle text-indigo-500 text-xl"></i>
                <h2 class="text-xl font-bold text-gray-800">Tambah Item Baru</h2>
            </div>
            <form id="itemForm" class="flex flex-col md:flex-row gap-4">
                <input type="text" id="name" placeholder="Nama Item" required 
                    class="flex-1 px-4 py-3 rounded-xl border border-gray-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition">
                <input type="url" id="imageUrl" placeholder="URL Gambar" required 
                    class="flex-1 px-4 py-3 rounded-xl border border-gray-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition">
                <input type="number" id="quantity" placeholder="Jumlah" required min="0" value="1" 
                    class="w-full md:w-32 px-4 py-3 rounded-xl border border-gray-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition">
                <button type="submit" 
                    class="bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white px-8 py-3 rounded-xl font-semibold transition transform hover:scale-105">
                    <i class="fas fa-save mr-2"></i>Simpan
                </button>
            </form>
        </div>

        <!-- Header Grid -->
        <div class="flex flex-wrap justify-between items-center mb-5 gap-3">
            <div class="flex items-center gap-2">
                <i class="fas fa-cubes text-white text-xl"></i>
                <h3 class="text-xl font-bold text-white">📦 Koleksi Item</h3>
                <span id="itemCountBadge" class="bg-white/20 text-white text-xs rounded-full px-2 py-1">0 items</span>
            </div>
        </div>

        <!-- Grid Item -->
        <div id="itemsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <div class="col-span-full flex justify-center py-12">
                <div class="animate-pulse flex flex-col items-center text-white">
                    <i class="fas fa-spinner fa-spin text-3xl"></i>
                    <p class="mt-2">Memuat inventaris...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Edit -->
    <div id="editModal" class="fixed inset-0 hidden items-center justify-center z-50">
        <div class="modal-overlay absolute inset-0" onclick="closeEditModal()"></div>
        <div class="bg-white rounded-2xl p-6 w-full max-w-md relative z-10 shadow-2xl transform transition-all">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-gray-800">✏️ Edit Item</h3>
                <button onclick="closeEditModal()" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <form id="editForm">
                <input type="hidden" id="editId">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Nama Item</label>
                    <input type="text" id="editName" required class="edit-input">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">URL Gambar</label>
                    <input type="url" id="editImageUrl" required class="edit-input">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Jumlah</label>
                    <input type="number" id="editQuantity" required min="0" class="edit-input">
                </div>
                <div class="flex gap-3">
                    <button type="submit" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded-xl font-semibold transition">
                        <i class="fas fa-save mr-2"></i>Simpan Perubahan
                    </button>
                    <button type="button" onclick="closeEditModal()" class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 py-2 rounded-xl font-semibold transition">
                        Batal
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentItems = [];

        // Toast Notification System
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const colors = {
                success: 'bg-green-500',
                error: 'bg-red-500',
                info: 'bg-blue-500',
                warning: 'bg-yellow-500'
            };
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                info: 'fa-info-circle',
                warning: 'fa-exclamation-triangle'
            };
            
            const toast = document.createElement('div');
            toast.className = `${colors[type]} text-white px-6 py-3 rounded-lg shadow-lg mb-3 flex items-center gap-3 animate-fade-in`;
            toast.style.animation = 'slideInRight 0.3s ease';
            toast.innerHTML = `
                <i class="fas ${icons[type]}"></i>
                <span class="flex-1">${message}</span>
                <button onclick="this.parentElement.remove()" class="hover:opacity-75">
                    <i class="fas fa-times"></i>
                </button>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                if (toast.parentElement) toast.remove();
            }, 3000);
        }

        // Fetch Items
        async function fetchItems() {
            try {
                const res = await fetch('/api/items');
                if (!res.ok) throw new Error("Gagal mengambil data");
                const items = await res.json();
                currentItems = items;
                renderItems(items);
                document.getElementById('itemCountBadge').innerText = `${items.length} item${items.length !== 1 ? 's' : ''}`;
            } catch (err) {
                showToast(err.message, 'error');
                document.getElementById('itemsGrid').innerHTML = `
                    <div class="col-span-full text-center py-12 text-white">
                        <i class="fas fa-plug text-4xl mb-3"></i>
                        <p>Gagal terhubung ke server</p>
                        <button onclick="fetchItems()" class="mt-3 bg-white/20 px-4 py-2 rounded-lg">Coba Lagi</button>
                    </div>
                `;
            }
        }

        // Render Items
        function renderItems(items) {
            const grid = document.getElementById('itemsGrid');
            if (!items.length) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-12 bg-white/10 rounded-2xl text-white">
                        <i class="fas fa-archive text-4xl mb-3"></i>
                        <p>Belum ada item. Tambahkan item baru!</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = items.map(item => `
                <div class="inventory-card overflow-hidden rounded-xl bg-white">
                    <img src="${item.image_url || 'https://placehold.co/400x300?text=No+Image'}" 
                         alt="${item.name}" 
                         class="w-full h-48 object-cover bg-gray-100"
                         onerror="this.src='https://placehold.co/400x300?text=Image+Error'">
                    <div class="p-4">
                        <h3 class="font-bold text-lg text-gray-800 truncate">${escapeHtml(item.name)}</h3>
                        <div class="mt-3 space-y-3">
                            <!-- Quantity Control -->
                            <div class="flex items-center justify-between">
                                <span class="text-sm text-gray-600"><i class="fas fa-cubes"></i> Jumlah</span>
                                <div class="flex items-center gap-2">
                                    <button onclick="updateQuantity(${item.id}, ${item.quantity - 1})" 
                                            class="w-8 h-8 rounded-full bg-red-100 text-red-600 hover:bg-red-200 transition">
                                        <i class="fas fa-minus text-sm"></i>
                                    </button>
                                    <span class="font-bold text-gray-800 min-w-[40px] text-center">${item.quantity}</span>
                                    <button onclick="updateQuantity(${item.id}, ${item.quantity + 1})" 
                                            class="w-8 h-8 rounded-full bg-green-100 text-green-600 hover:bg-green-200 transition">
                                        <i class="fas fa-plus text-sm"></i>
                                    </button>
                                </div>
                            </div>
                            <!-- Action Buttons -->
                            <div class="flex gap-2 pt-2">
                                <button onclick="openEditModal(${item.id})" 
                                        class="flex-1 bg-indigo-500 hover:bg-indigo-600 text-white py-2 rounded-lg text-sm transition">
                                    <i class="fas fa-edit mr-1"></i> Edit
                                </button>
                                <button onclick="deleteItem(${item.id})" 
                                        class="flex-1 bg-red-500 hover:bg-red-600 text-white py-2 rounded-lg text-sm transition">
                                    <i class="fas fa-trash mr-1"></i> Hapus
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Update Quantity (tanpa Swal)
        async function updateQuantity(id, newQty) {
            if (newQty < 0) return;
            try {
                const res = await fetch(`/api/items/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ quantity: newQty })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Gagal update');
                
                showToast(`✅ Jumlah berhasil diupdate menjadi ${newQty}`, 'success');
                fetchItems();
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        // Delete Item
        async function deleteItem(id) {
            if (!confirm('Yakin ingin menghapus item ini? Tindakan ini tidak dapat dibatalkan.')) return;
            
            try {
                const res = await fetch(`/api/items/${id}`, {
                    method: 'DELETE'
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Gagal hapus item');
                
                showToast('🗑️ Item berhasil dihapus', 'success');
                fetchItems();
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        // Open Edit Modal
        function openEditModal(id) {
            const item = currentItems.find(i => i.id === id);
            if (!item) return;
            
            document.getElementById('editId').value = item.id;
            document.getElementById('editName').value = item.name;
            document.getElementById('editImageUrl').value = item.image_url;
            document.getElementById('editQuantity').value = item.quantity;
            document.getElementById('editModal').classList.remove('hidden');
            document.getElementById('editModal').classList.add('flex');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
            document.getElementById('editModal').classList.remove('flex');
        }

        // Update Item (Edit lengkap: nama, gambar, jumlah)
        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = parseInt(document.getElementById('editId').value);
            const name = document.getElementById('editName').value;
            const image_url = document.getElementById('editImageUrl').value;
            const quantity = parseInt(document.getElementById('editQuantity').value);
            
            try {
                const res = await fetch(`/api/items/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, image_url, quantity })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Gagal update item');
                
                showToast('✏️ Item berhasil diperbarui', 'success');
                closeEditModal();
                fetchItems();
            } catch (err) {
                showToast(err.message, 'error');
            }
        });

        // Add New Item
        document.getElementById('itemForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const image_url = document.getElementById('imageUrl').value;
            const quantity = parseInt(document.getElementById('quantity').value);
            
            try {
                const res = await fetch('/api/items', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, image_url, quantity })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Gagal tambah item');
                
                showToast('✨ Item baru berhasil ditambahkan!', 'success');
                document.getElementById('itemForm').reset();
                document.getElementById('quantity').value = '1';
                fetchItems();
            } catch (err) {
                showToast(err.message, 'error');
            }
        });

        // Initial Load
        fetchItems();
    </script>
</body>
</html>
