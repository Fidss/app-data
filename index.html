<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>✨ InventarisPintar | Manajemen Item Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Font Awesome Icons for extra polish -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* custom glassmorphism + modern micro-interactions */
        body {
            background: linear-gradient(145deg, #f0f9ff 0%, #e9f0fa 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(255,255,255,0.5);
        }
        .inventory-card {
            transition: all 0.25s ease;
            border-radius: 1.5rem;
            background: white;
            border: 1px solid rgba(203, 213, 225, 0.4);
            backdrop-filter: blur(0px);
        }
        .inventory-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.12);
            border-color: #cbd5e1;
        }
        .modern-input {
            transition: all 0.2s;
            background-color: #fefefe;
            border: 1px solid #e2e8f0;
        }
        .modern-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
            outline: none;
        }
        .btn-gradient {
            background: linear-gradient(105deg, #2563eb, #1d4ed8);
            transition: transform 0.1s, box-shadow 0.2s;
        }
        .btn-gradient:hover {
            transform: scale(0.98);
            box-shadow: 0 8px 20px rgba(37,99,235,0.3);
        }
        .quantity-input-modern {
            width: 70px;
            text-align: center;
            font-weight: 600;
            border-radius: 40px;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            padding: 6px 0;
        }
        .badge-stock {
            background: #eef2ff;
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #1e40af;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .grid-placeholder {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
            background: rgba(255,255,240,0.6);
            border-radius: 2rem;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .animate-fade {
            animation: fadeIn 0.3s ease forwards;
        }
    </style>
</head>
<body class="font-sans antialiased">

    <div class="max-w-7xl mx-auto px-4 py-6 md:py-8">
        <!-- Header Elegant -->
        <div class="glass-card p-5 md:p-6 mb-8 flex flex-wrap justify-between items-center gap-4">
            <div>
                <h1 class="text-3xl md:text-4xl font-extrabold bg-gradient-to-r from-indigo-700 to-blue-600 bg-clip-text text-transparent flex items-center gap-2">
                    <i class="fas fa-boxes text-blue-600"></i> InventarisPintar
                </h1>
                <p class="text-slate-500 text-sm mt-1 flex items-center gap-1"><i class="fas fa-database text-xs"></i> realtime supabase response • modern inventory</p>
            </div>
            <div class="flex items-center gap-3 text-sm bg-white/60 rounded-full px-4 py-2 shadow-sm">
                <i class="fas fa-sync-alt text-blue-500"></i>
                <span class="font-medium">kelola stok lebih cerdas</span>
            </div>
        </div>

        <!-- Form Tambah Item elegan dengan efek -->
        <div class="glass-card p-5 md:p-7 mb-10 transition-all">
            <div class="flex items-center gap-2 border-b border-slate-200 pb-3 mb-5">
                <i class="fas fa-plus-circle text-blue-500 text-xl"></i>
                <h2 class="text-xl font-bold text-slate-800">Tambah Item Baru</h2>
                <span class="text-xs bg-blue-100 text-blue-700 rounded-full px-2 py-0.5 ml-2">supabase ready</span>
            </div>
            <form id="itemForm" class="flex flex-col md:flex-row gap-4">
                <div class="flex-1 relative">
                    <i class="fas fa-tag absolute left-3 top-3 text-gray-400 text-sm"></i>
                    <input type="text" id="name" placeholder="Nama item (contoh: Headphone Pro)" required class="modern-input w-full pl-9 pr-4 py-3 rounded-xl border border-gray-200 focus:border-blue-400 transition">
                </div>
                <div class="flex-1 relative">
                    <i class="fas fa-image absolute left-3 top-3 text-gray-400 text-sm"></i>
                    <input type="url" id="imageUrl" placeholder="URL gambar (https://...)" required class="modern-input w-full pl-9 pr-4 py-3 rounded-xl border border-gray-200">
                </div>
                <div class="w-full md:w-36 relative">
                    <i class="fas fa-hashtag absolute left-3 top-3 text-gray-400 text-sm"></i>
                    <input type="number" id="quantity" placeholder="Jumlah" required min="0" value="1" class="modern-input w-full pl-9 pr-4 py-3 rounded-xl border border-gray-200">
                </div>
                <button type="submit" class="btn-gradient text-white font-semibold px-8 py-3 rounded-xl shadow-md flex items-center justify-center gap-2 transition-all">
                    <i class="fas fa-save"></i> Simpan Item
                </button>
            </form>
        </div>

        <!-- Bagian Grid + Kontrol massal update (modern) -->
        <div class="flex flex-wrap justify-between items-center mb-5 gap-3">
            <div class="flex items-center gap-2">
                <i class="fas fa-cubes text-indigo-500 text-xl"></i>
                <h3 class="text-xl font-bold text-slate-800">📦 Koleksi Item</h3>
                <span id="itemCountBadge" class="bg-gray-200 text-gray-700 text-xs rounded-full px-2 py-1">0 items</span>
            </div>
            <div class="text-sm text-slate-500 bg-white/50 px-3 py-1.5 rounded-full">
                <i class="fas fa-pen-alt mr-1"></i> klik angka untuk ubah jumlah massal
            </div>
        </div>

        <!-- GRID Item dengan fitur UPDATE JUMLAH LANGSUNG (bukan tombol +/- saja, tapi input text) -->
        <div id="itemsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-7">
            <!-- loader sederhana -->
            <div class="col-span-full flex justify-center py-12">
                <div class="animate-pulse flex flex-col items-center">
                    <i class="fas fa-spinner fa-spin text-3xl text-blue-400"></i>
                    <p class="mt-2 text-slate-400">Memuat inventaris...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ---------- GLOBAL VARIABLES ----------
        let currentItems = [];   // simpan data item lokal untuk update cepat di grid

        // DOM Elements
        const itemsGrid = document.getElementById('itemsGrid');
        const itemCountSpan = document.getElementById('itemCountBadge');

        // Helper: render grid dengan tampilan modern dan fitur INPUT NUMBER untuk update jumlah (bukan +/- manual saja)
        function renderItems(items) {
            if (!itemsGrid) return;
            if (!items || items.length === 0) {
                itemsGrid.innerHTML = `
                    <div class="col-span-full flex flex-col items-center justify-center py-16 glass-card animate-fade">
                        <i class="fas fa-archive text-5xl text-gray-300 mb-3"></i>
                        <p class="text-gray-500 font-medium">Belum ada item, tambahkan item pertama ✨</p>
                    </div>
                `;
                if(itemCountSpan) itemCountSpan.innerText = `0 items`;
                return;
            }

            let html = '';
            items.forEach(item => {
                // sanitasi nama dan quantity
                const itemName = escapeHtml(item.name);
                const imageUrl = item.image_url && item.image_url.trim() !== "" ? item.image_url : 'https://placehold.co/600x400?text=No+Image';
                const qty = item.quantity !== undefined ? item.quantity : 0;

                html += `
                    <div class="inventory-card overflow-hidden rounded-2xl bg-white shadow-sm hover:shadow-xl transition-all duration-300 group animate-fade" data-id="${item.id}">
                        <div class="relative h-48 overflow-hidden bg-gray-100">
                            <img src="${imageUrl}" alt="${itemName}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" 
                                onerror="this.onerror=null; this.src='https://placehold.co/600x400?text=Image+Error';">
                            <div class="absolute top-3 right-3 bg-white/80 backdrop-blur-sm rounded-full px-2 py-1 text-xs font-semibold shadow-sm">
                                <i class="fas fa-box-open text-blue-500 mr-1"></i> stok
                            </div>
                        </div>
                        <div class="p-4">
                            <h3 class="font-bold text-lg text-gray-800 truncate flex items-center gap-1">
                                <i class="fas fa-cube text-blue-400 text-sm"></i> ${itemName}
                            </h3>
                            <!-- Bagian update jumlah modern: input number + tombol update, dan tetap support +/- opsional -->
                            <div class="mt-4 bg-gray-50 p-3 rounded-xl border border-gray-100">
                                <div class="flex items-center justify-between gap-2 flex-wrap">
                                    <span class="text-xs font-medium text-gray-500 flex items-center gap-1"><i class="fas fa-edit"></i> Ubah jumlah</span>
                                    <div class="flex items-center gap-2 bg-white rounded-full shadow-inner p-1 pl-3">
                                        <button onclick="adjustQuantityDirect(${item.id}, -1)" class="w-8 h-8 rounded-full bg-red-100 text-red-600 hover:bg-red-200 transition flex items-center justify-center text-lg font-bold">−</button>
                                        <input type="number" id="qty-input-${item.id}" value="${qty}" min="0" step="1" class="quantity-input-modern w-14 text-center font-mono text-base focus:outline-none focus:ring-1 focus:ring-blue-300 rounded-full">
                                        <button onclick="adjustQuantityDirect(${item.id}, 1)" class="w-8 h-8 rounded-full bg-green-100 text-green-600 hover:bg-green-200 transition flex items-center justify-center text-lg font-bold">+</button>
                                    </div>
                                    <button onclick="updateSingleQuantityFromInput(${item.id})" class="text-xs bg-indigo-50 hover:bg-indigo-100 text-indigo-700 px-3 py-1.5 rounded-full transition font-medium flex items-center gap-1">
                                        <i class="fas fa-check-circle text-xs"></i> Update
                                    </button>
                                </div>
                                <div class="flex justify-between items-center mt-2 pt-1 text-xs text-gray-400 border-t border-gray-100">
                                    <span><i class="far fa-clock"></i> ID: ${item.id}</span>
                                    <span class="badge-stock"><i class="fas fa-cubes"></i> ${qty} unit</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            itemsGrid.innerHTML = html;
            if(itemCountSpan) itemCountSpan.innerText = `${items.length} item${items.length !== 1 ? 's' : ''}`;
        }

        // simple XSS protection
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }

        // FETCH data dari API endpoint (simulasi /api/items - namun kita pasang base URL dinamis)
        // Asumsi backend endpoint yang sama seperti pada requirement: /api/items & /api/items/:id
        // Untuk keperluan demo, jika tidak ada backend asli, kita buat mock dengan localStorage? TAPI TETAP PAKAI FETCH sesuai spesifikasi.
        // Karena spec asli mengharapkan endpoint /api/items , supaya tidak error, kita tetap fetch. Jika error karena backend belum ada,
        // kita akan tampilkan error via swal namun tetap menggunakan mock data sementara? TAPI requirement asli: "Respon Supabase Lengkap", artinya perlu backend sungguhan.
        // Disini saya asumsikan sudah ada backend yang menyediakan endpoint REST /api/items dan method PUT/POST, jadi kode tetap menggunakan fetch ke endpoint tsb.
        // Untuk pengalaman pengguna jika backend offline akan muncul pesan error. Karena ini frontend lengkap, tapi saya akan tambahkan fallback sederhana agar tidak crash,
        // tapi tidak menyimpang dari requirement utama (menampilkan respon supabase). Kita tetap andalkan fetch nyata.
        
        async function fetchItems() {
            try {
                const res = await fetch('/api/items');
                if (!res.ok) {
                    const errorText = await res.text();
                    throw new Error(`Server error ${res.status}: ${errorText.substring(0, 100)}`);
                }
                const items = await res.json();
                currentItems = Array.isArray(items) ? items : [];
                renderItems(currentItems);
                return currentItems;
            } catch (err) {
                console.error("Fetch items gagal:", err);
                Swal.fire({
                    icon: 'warning',
                    title: 'Koneksi ke server gagal',
                    text: 'Pastikan backend API berjalan di /api/items. Menampilkan mode demo terbatas?',
                    confirmButtonColor: '#3b82f6'
                });
                itemsGrid.innerHTML = `<div class="col-span-full glass-card p-8 text-center text-red-500"><i class="fas fa-plug text-3xl mb-2 block"></i> Gagal memuat data dari server. Periksa koneksi atau backend Supabase Anda.<br><button onclick="fetchItems()" class="mt-3 bg-blue-500 text-white px-4 py-2 rounded-full text-sm"><i class="fas fa-redo-alt"></i> Coba lagi</button></div>`;
                currentItems = [];
                if(itemCountSpan) itemCountSpan.innerText = `0 items`;
                return [];
            }
        }

        // Fungsi update quantity langsung via input number (massal / individual)
        async function updateSingleQuantityFromInput(itemId) {
            const inputElem = document.getElementById(`qty-input-${itemId}`);
            if (!inputElem) return;
            let newQty = parseInt(inputElem.value, 10);
            if (isNaN(newQty)) newQty = 0;
            if (newQty < 0) newQty = 0;
            
            await updateQuantityAPI(itemId, newQty);
        }
        
        // adjust via tombol +/- dan update langsung
        async function adjustQuantityDirect(itemId, delta) {
            const currentItem = currentItems.find(it => it.id === itemId);
            if (!currentItem) return;
            let newQuantity = (currentItem.quantity || 0) + delta;
            if (newQuantity < 0) newQuantity = 0;
            // langsung update API
            await updateQuantityAPI(itemId, newQuantity);
        }
        
        // Core update API, dengan menampilkan respon supabase (Sesuai spesifikasi: tampilkan respon sukses/gagal lengkap)
        async function updateQuantityAPI(id, newQuantity) {
            try {
                const res = await fetch(`/api/items/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ quantity: newQuantity })
                });
                const responseData = await res.json();
                
                if (!res.ok) {
                    // error response detail dari supabase
                    throw new Error(responseData.detail || JSON.stringify(responseData));
                }
                
                // TAMPILKAN RESPON LENGKAP SUPABASE SAAT UPDATE JUMLAH SUKSES (tapi tidak berlebihan, namun sesuai kebutuhan modern)
                Swal.fire({
                    icon: 'success',
                    title: '✅ Jumlah Diperbarui',
                    html: `<div class="text-left">
                            <p class="font-medium text-green-700">Respon dari Supabase / Server:</p>
                            <div class="bg-gray-800 text-green-200 p-3 rounded-lg text-xs font-mono mt-2 overflow-auto max-h-48">
                            ${JSON.stringify(responseData, null, 2).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>')}
                            </div>
                           </div>`,
                    confirmButtonColor: '#2563eb',
                    background: '#fff',
                    showClass: { popup: 'animate__animated animate__fadeInDown' }
                });
                
                // refresh ulang data dari server
                await fetchItems();
                return true;
            } catch (error) {
                Swal.fire({
                    icon: 'error',
                    title: '❌ Gagal Update Jumlah',
                    html: `<div class="text-left"><p class="text-sm text-red-600 mb-2">Terjadi kesalahan saat update stok:</p>
                           <div class="bg-red-50 text-red-800 p-3 rounded-lg text-xs font-mono border border-red-200">
                            ${error.message}
                           </div></div>`,
                    confirmButtonColor: '#d33'
                });
                return false;
            }
        }
        
        // CREATE item (POST) dengan tampilan lengkap response supabase
        const itemForm = document.getElementById('itemForm');
        if (itemForm) {
            itemForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const nameInput = document.getElementById('name');
                const imageUrlInput = document.getElementById('imageUrl');
                const quantityInput = document.getElementById('quantity');
                
                const name = nameInput.value.trim();
                const image_url = imageUrlInput.value.trim();
                let quantity = parseInt(quantityInput.value, 10);
                if (isNaN(quantity)) quantity = 0;
                if (quantity < 0) quantity = 0;
                
                if (!name) {
                    Swal.fire('Oops', 'Nama item tidak boleh kosong', 'warning');
                    return;
                }
                if (!image_url) {
                    Swal.fire('Perhatian', 'URL gambar diperlukan', 'info');
                    return;
                }
                
                try {
                    const res = await fetch('/api/items', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, image_url, quantity })
                    });
                    
                    const data = await res.json();
                    
                    if (!res.ok) {
                        throw new Error(data.detail || JSON.stringify(data));
                    }
                    
                    // MENAMPILKAN FULL RESPON SUKSES DARI SUPABASE SEBAGAI SWAL (sesuai requirement)
                    Swal.fire({
                        icon: 'success',
                        title: '✨ Item Berhasil Ditambahkan',
                        html: `<div class="text-left">
                                <p class="font-semibold text-blue-700">Respon penuh dari Supabase / API:</p>
                                <div class="bg-gray-900 text-blue-100 p-3 rounded-xl text-xs font-mono mt-3 max-h-64 overflow-auto">
                                <pre style="white-space: pre-wrap; word-break: break-word;">${JSON.stringify(data, null, 2)}</pre>
                                </div>
                               </div>`,
                        confirmButtonColor: '#2563eb',
                        width: '32rem'
                    });
                    
                    // reset form
                    nameInput.value = '';
                    imageUrlInput.value = '';
                    quantityInput.value = '1';
                    // refresh list
                    await fetchItems();
                    
                } catch (err) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Gagal simpan ke Supabase',
                        html: `<div class="text-left"><p class="text-sm text-red-600 font-semibold">Detail error dari server:</p>
                               <div class="bg-red-100 p-3 rounded-lg text-xs font-mono mt-2 text-red-800 border border-red-300">
                                ${err.message}
                               </div></div>`,
                        confirmButtonColor: '#d33'
                    });
                }
            });
        }
        
        // Optional: fungsi global untuk update via enter pada input number (biar lebih modern)
        document.addEventListener('keypress', async function(e) {
            if (e.target && e.target.id && e.target.id.startsWith('qty-input-')) {
                if (e.key === 'Enter') {
                    const idStr = e.target.id.replace('qty-input-', '');
                    const itemId = parseInt(idStr, 10);
                    if (!isNaN(itemId)) {
                        await updateSingleQuantityFromInput(itemId);
                    }
                }
            }
        });
        
        // Initialize app
        (async () => {
            await fetchItems();
        })();
        
        // Expose fungsi ke global scope untuk tombol onclick (karena dari innerHTML)
        window.updateSingleQuantityFromInput = updateSingleQuantityFromInput;
        window.adjustQuantityDirect = adjustQuantityDirect;
        window.fetchItems = fetchItems;
    </script>
</body>
</html>
